kafka:
  read-all-data: false
  max-message-size: 5242880
  hosts: 192.168.1.41:9092
  consumer-group: dev-object-service-128
  telematics:
    max-processed-queue: 500000
  consumers:
    telematics-consumer: telematics-consumer-5
  topics:
    object-topic: dev-object-create-event-topic
    object-edit-topic: dev-edit-object-topic
    object-new-topic: dev-new-object-topic
    object-delete-topic: dev-delete-object-topic
    new-processed-data: dev-new-processed-data-topic
  trusted: '*'

eureka:
  client:
    service-url:
      defaultZone: http://192.168.1.41:9999/eureka/
    enabled: false
  instance:
    prefer-ip-address: true

mirep:
  telematics:
    # Архив какой глубины отправлять в кафка (часы).
    # Данные ранее этого периода не будут отправлены в кафка для остальных сервисов
    beginning-archive-to-kafka: 48
    need-send-to-kafka: true
  db-settings:
    delay-saving-in-db: 10
  mem-table:
    max-days-in-mem: 7
  debug:
    record-raw-data: true
  route:
    point-limit: 30000
    expire-timeout: 48
  move-state:
    min-speed: 5
    min-dist: 100
    ign-analyze: true
  validate-object:
    max-speed: 300
    max-dist: 10000
    min-sat-count: 4
  services-url:
    xlsx-parsing-service: http://127.0.0.1:9091/v1
    geo-service: http://127.0.0.1:8091/v1
  paths:
    reports: ./reports
    uploads: ./uploads
  logging:
    #controllers
    ObjectController: INFO
    #services
    ObjectService: INFO
    TelematicsRedisService: INFO
    TelematicsProcessingService: DEBUG

management:
  endpoints:
    enabled-by-default: true
    web:
      exposure:
        include: refresh

